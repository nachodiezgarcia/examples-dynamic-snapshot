services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      BACKEND_PORT: 3001
      CONTENT_ISLAND_READ_TOKEN: ${CONTENT_ISLAND_READ_TOKEN:-}
      REFRESH_SECRET: ${REFRESH_SECRET:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 3000
      API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
